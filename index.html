<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Végtelen Jegyzet PRO - STABLE V.01</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Abel&family=Abril+Fatface&family=Acme&family=Alegreya&family=Alex+Brush&family=Alfa+Slab+One&family=Alice&family=Alumni+Sans+Inline+One&family=Amatic+SC&family=Amita&family=Antic+Didone&family=Anton&family=Architects+Daughter&family=Archivo+Black&family=Are+You+Serious&family=Arima+Madurai&family=Arvo&family=Asap&family=Asset&family=Atomic+Age&family=Audiowide&family=Bangers&family=Barlow+Condensed&family=Bebas+Neue&family=Berkshire+Swash&family=Bevan&family=Bigelow+Rules&family=Black+Ops+One&family=Bonbon&family=Boogaloo&family=Bowlby+One+SC&family=Bungee+Shade&family=Butcherman&family=Cabin+Sketch&family=Caesar+Dressing&family=Carter+One&family=Caveat&family=Cinzel+Decorative&family=Codystar&family=Comfortaa&family=Coming+Soon&family=Concert+One&family=Cookie&family=Courgette&family=Creepster&family=Dancing+Script&family=Diplomata+SC&family=Domine&family=Eater&family=EB+Garamond&family=Emblema+One&family=Ewert&family=Fascinate+Inline&family=Faster+One&family=Finger+Paint&family=Flavors&family=Fontdiner+Swanky&family=Fredericka+the+Great&family=Frijole&family=Fugaz+One&family=Glass+Antiqua&family=Gloria+Hallelujah&family=Gochi+Hand&family=Great+Vibes&family=Grenze+Gotisch&family=Griffy&family=Handlee&family=Henny+Penny&family=Iceberg&family=Indie+Flower&family=Irish+Grover&family=Italianno&family=Jolly+Lodger&family=Kaushan+Script&family=Kelly+Slab&family=Kranky&family=Kumar+One&family=Lobster&family=Londrina+Shadow&family=Luckiest+Guy&family=Macondo&family=MedievalSharp&family=Megrim&family=Metal+Mania&family=Modak&family=Monoton&family=Mountains+of+Christmas&family=Mystery+Quest&family=Nabla&family=Nosifer&family=Nothing+You+Could+Do&family=Orbitron&family=Pacifico&family=Parisienne&family=Permanent+Marker&family=Pinyon+Script&family=Playfair+Display&family=Press+Start+2P&family=Righteous&family=Rubik+Glitch&family=Sacramento&family=Satisfy&family=Shadows+Into+Light&family=Silkscreen&family=Special+Elite&family=Syncopate&family=Ultra&family=UnifrakturMaguntia&family=VT323&family=Wallpoet&family=Zeyada&family=Montserrat&family=Nunito&family=Oswald&family=Spectral&family=Varela+Round&family=Roboto+Serif&family=Roboto+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0c0c;--panel:#141414;--text:#ddd;--border:#333;--accent:#00ff00;--val-color:#00ffff;} /* Színváltozók. */
.light{--bg:#f0f0f0;--panel:#e0e0e0;--text:#111;--border:#ccc;--accent:#008800;--val-color:#0000ff;} /* Világos téma. */
body { margin: 0; font-family: Arial, sans-serif; background-color: var(--bg); color: var(--text); overflow: hidden; } /* Törzs stílusa. */
#neon-id { color: #ffff00; text-shadow: 0 0 5px #00ff00, 0 0 10px #00ff00; font-weight: bold; font-family: 'Orbitron', sans-serif; padding: 0 25px; font-size: 24px; } /* Fejléc felirat. */
.color-green { color: #55ff55 !important; } /* Zöld gomb stílus. */
.color-cyan { color: #55ffff !important; } /* Cián gomb stílus. */
.color-red { color: #ff5555 !important; } /* Piros gomb stílus. */
.zenburn-mode .token-section { color: #8cd0d3 !important; font-weight: bold; } /* Zenburn szekció szín. */
.zenburn-mode .token-key { color: #f0ef9d !important; } /* Zenburn kulcs szín. */
.zenburn-mode .token-comment { color: #7f9f7f !important; font-style: italic; } /* Zenburn komment szín. */
.danger-reset { color: #ff0000 !important; border: 2px solid #ff0000 !important; font-weight: bold !important; } /* Reset gomb kiemelése. */
.success-import { color: #00ff00 !important; border: 2px solid #00ff00 !important; font-weight: bold !important; } /* Import gomb kiemelése. */
#topbar{display:flex;flex-wrap:wrap;gap:5px;padding:10px;background:var(--panel);border-bottom:1px solid var(--border);align-items:center;} /* Felső sáv elrendezés. */
button,select,input{background:#000;color:var(--text);border:1px solid var(--border);padding:8px 12px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:14px;display:inline-flex;align-items:center;gap:6px;} /* Beviteli elemek. */
#notes { font-weight: bold; width: 220px; color: #00ff00; } /* Jegyzet választó stílus. */
#container { position: relative; width: 100vw; height: calc(100vh - 160px); background: rgba(0,0,0,0.8); overflow: hidden; } /* Szerkesztő konténer. */
#editor, #highlight { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 20px; box-sizing: border-box; border: none; outline: none; line-height: 1.5; font-size: 25px; white-space: pre-wrap; word-wrap: break-word; margin: 0; overflow-y: auto; font-family: Arial, sans-serif; } /* Közös szövegstílus. */
#editor { background: transparent; color: transparent; caret-color: white; z-index: 2; resize: none; -webkit-text-fill-color: transparent; } /* Láthatatlan textarea. */
#highlight { z-index: 1; pointer-events: none; color: inherit; } /* Megjelenítő réteg. */
#stats{position:fixed;bottom:10px;right:20px;font-family:'VT323';font-size:18px;color:var(--accent);pointer-events:none;} /* Statisztika kijelző. */
.group{display:flex;align-items:center;gap:6px;border-right:1px solid var(--border);padding-right:8px;margin-right:4px;} /* Csoportosító keret. */
</style>
</head>
<body class="zenburn-mode">

<div id="topbar">
    <div id="neon-id">Securics-08-TXT-Save_STABLE_V.01</div> <div class="group">
        <select id="notes" onchange="switchNote()"></select> <button onclick="newNote()">+ Új</button> </div>

    <div class="group">
        <select id="fontFamily" onchange="changeFont()"></select> <input type="number" id="fontSize" value="25" min="8" max="150" style="width:60px" oninput="changeSize()"> <button onclick="toggleBold()" class="color-green"><b>B</b></button> <button onclick="toggleItalic()" class="color-cyan"><i>/</i></button> <button onclick="toggleUnderline()" class="color-red"><u>U</u></button> </div>

    <div class="group">
        <input type="color" id="textColor" value="#eeeeee" oninput="updateStyles()"> <input type="color" id="bgColor" value="#000000" oninput="updateStyles()"> <input type="range" id="opacity" min="0" max="1" step="0.1" value="0.7" style="width:100px" oninput="updateStyles()"> <button onclick="speakText()">🔊</button> <button onclick="stopSpeak()" style="background:#800000; color:white">■</button> <button onclick="setZenburn(true)">🎨 Z</button> <button onclick="setZenburn(false)">⚪ N</button> </div>

    <div class="group">
        <select id="transDir">
            <option value="hu|en">Magyar ➡ Angol</option>
            <option value="en|hu">Angol ➡ Magyar</option>
        </select> <button onclick="translateText()" class="color-green">🌐 Fordítás</button> </div>

    <div class="group">
        <button onclick="exportJSON()">✉️ Küldés</button> <button onclick="toggleDark()">🌗 Mód</button> <button onclick="undo()">⬅️ Vissza</button> <button onclick="redo()">➡️ Előre</button> </div>

    <div class="group">
        <button onclick="importFiles()" class="success-import">📁 Import</button> <button onclick="saveIni()" style="color:#ffcc00">📜 INI</button> <button onclick="downloadPDF()" style="color:#ff5555">📄 PDF</button> <button onclick="downloadTxt()" style="color:#ff55ff">⬇️ TXT</button> <button onclick="downloadAllZip()" style="color:#55ff55">📦 ZIP</button> </div>

    <div class="group">
        <button onclick="deleteCurrent()" class="color-red">🗑️ Töröl</button> <button onclick="resetApp()" class="danger-reset">⚠️ RESET</button> </div>

    <input id="search" placeholder="Keresés..." oninput="searchText()"> </div>

<div id="container">
    <div id="highlight"></div> <textarea id="editor" spellcheck="false" oninput="handleInput()" onpaste="handlePaste()" onscroll="syncScroll()" placeholder="Írj ide..."></textarea> </div>
<div id="stats">Szavak: <span id="wCount">0</span> | Karakterek: <span id="cCount">0</span></div> 

<script>
const rawFonts = ["Abel","Abril Fatface","Acme","Alegreya","Alex Brush","Alfa Slab One","Alice","Alumni Sans Inline One","Amatic SC","Amita","Antic Didone","Anton","Architects Daughter","Archivo Black","Are You Serious","Arial","Arima Madurai","Arvo","Asap","Asset","Atomic Age","Audiowide","Bangers","Barlow Condensed","Bebas Neue","Berkshire Swash","Bevan","Bigelow Rules","Black Ops One","Bonbon","Boogaloo","Bowlby One SC","Bungee Shade","Butcherman","Cabin Sketch","Caesar Dressing","Carter One","Caveat","Cinzel Decorative","Codystar","Comfortaa","Coming Soon","Concert One","Cookie","Courgette","Creepster","Dancing Script","Diplomata SC","Domine","Eater","EB Garamond","Emblema One","Ewert","Fascinate Inline","Faster One","Finger Paint","Flavors","Fontdiner Swanky","Fredericka the Great","Frijole","Fugaz One","Glass Antiqua","Gloria Hallelujah","Gochi Hand","Great Vibes","Grenze Gotisch","Griffy","Handlee","Henny Penny","Iceberg","Indie Flower","Irish Grover","Italianno","Jolly Lodger","Kaushan Script","Kelly Slab","Kranky","Kumar One","Lobster","Londrina Shadow","Luckiest Guy","Macondo","MedievalSharp","Megrim","Metal Mania","Modak","Monoton","Mountains of Christmas","Mystery Quest","Nabla","Nosifer","Nothing You Could Do","Orbitron","Pacifico","Parisienne","Permanent Marker","Pinyon Script","Playfair Display","Press Start 2P","Righteous","Rubik Glitch","Sacramento","Satisfy","Shadows Into Light","Silkscreen","Special Elite","Syncopate","Ultra","UnifrakturMaguntia","VT323","Wallpoet","Zeyada","Montserrat","Nunito","Oswald","Spectral","Varela Round","Roboto Serif","Roboto Mono"]; /* Betűtípus lista. ; List of fonts */
const fontColors = ["#ff5555", "#55ff55", "#5555ff", "#ffff55", "#ff55ff", "#55ffff", "#ffaa00", "#ff00aa", "#aa00ff", "#00ffaa"]; /* Választó színei. ; Colors for the selector */

let db; /* Adatbázis változó. ; Database variable */
let notes = {}; /* Jegyzetek objektum. ; Notes object */
let current = ""; /* Aktuális jegyzet neve. ; Current note name */

const request = indexedDB.open("NotesUltraDB", 1); /* DB megnyitása. ; Opening DB */
request.onupgradeneeded = e => { db = e.target.result; db.createObjectStore("notes"); }; /* Tároló létrehozása. ; Creating object store */
request.onsuccess = e => { db = e.target.result; loadFromDB(); }; /* Sikeres csatlakozás. ; Successful connection */

function loadFromDB() {
    const transaction = db.transaction(["notes"], "readonly"); /* Olvasási tranzakció. ; Read transaction */
    const store = transaction.objectStore("notes"); /* Tároló lekérése. ; Getting the store */
    const req = store.get("all_notes"); /* Adatok lekérése. ; Retrieving data */
    req.onsuccess = () => {
        notes = req.result || {"Üdvözlő!!!": "Készen állunk! ; Ready to go"}; /* Alapértelmezett betöltés. ; Loading defaults */
        current = Object.keys(notes)[0]; /* Első elem kiválasztása. ; Selecting first item */
        refresh(); /* Felület frissítése. ; Refreshing interface */
    };
}

function saveData() { if (!db) return; const transaction = db.transaction(["notes"], "readwrite"); transaction.objectStore("notes").put(notes, "all_notes"); } /* Adatmentés. ; Saving data */

function handleInput() { notes[current] = document.getElementById("editor").value; applyHighlight(); updateStats(); saveData(); } /* Bevitel kezelése. ; Handling input */
function handlePaste() { setTimeout(handleInput, 0); } /* Beillesztés kezelése. ; Handling paste */

function refresh() {
    const select = document.getElementById("notes"); /* Választó elem. ; Selector element */
    select.innerHTML = ""; /* Kiürítés. ; Clearing */
    Object.keys(notes).forEach((n, i) => {
        let o = document.createElement("option"); o.value = n; o.textContent = n;
        o.style.color = fontColors[i % fontColors.length]; /* Színes szöveg. ; Colored text */
        select.appendChild(o);
    });
    select.value = current; /* Érték beállítása. ; Setting value */
    document.getElementById("editor").value = notes[current] || ""; /* Szöveg betöltése. ; Loading text */
    applyHighlight(); /* Kiemelés alkalmazása. ; Applying highlighting */
    updateStats(); /* Statisztika frissítése. ; Updating stats */
}

function switchNote() { current = document.getElementById("notes").value; refresh(); } /* Jegyzetváltás. ; Switching notes */
function newNote() { let n = prompt("Név:"); if (n) { notes[n] = ""; current = n; refresh(); saveData(); } } /* Új jegyzet. ; New note */

function deleteCurrent() { if (confirm("Törlöd ezt a jegyzetet?")) { delete notes[current]; current = Object.keys(notes)[0] || "Üdvözlő!!!"; if(!notes[current]) notes["Üdvözlő!!!"] = ""; refresh(); saveData(); } } /* Törlés. ; Deleting */

function resetApp() { if (confirm("MINDEN törlődik! Biztos?")) { const t = db.transaction(["notes"], "readwrite"); t.objectStore("notes").clear(); location.reload(); } } /* Alaphelyzet. ; Factory reset */

function applyHighlight() {
    const editor = document.getElementById("editor"); /* Szerkesztő. ; Editor */
    const highlight = document.getElementById("highlight"); /* Kiemelő. ; Highlighter */
    let html = editor.value.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); /* HTML védelem. ; HTML escaping */
    if (document.body.classList.contains("zenburn-mode")) {
        html = html.replace(/(\[.*?\])/g, '<span class="token-section">$1</span>')
                   .replace(/^([\w\s]+=)/gm, '<span class="token-key">$1</span>')
                   .replace(/(;.*$)/gm, '<span class="token-comment">$1</span>');
    }
    highlight.innerHTML = html + (editor.value.endsWith('\n') ? ' ' : ''); /* HTML beillesztés. ; Inserting HTML */
}

function syncScroll() { document.getElementById("highlight").scrollTop = document.getElementById("editor").scrollTop; } /* Görgetés szinkron. ; Scroll sync */
function updateStats() { 
    const val = document.getElementById("editor").value;
    document.getElementById("wCount").innerText = val.trim() ? val.trim().split(/\s+/).length : 0; 
    document.getElementById("cCount").innerText = val.length; 
} /* Statisztika frissítése. ; Updating statistics */

function changeFont() { document.getElementById("editor").style.fontFamily = document.getElementById("highlight").style.fontFamily = document.getElementById("fontFamily").value; } /* Betűtípus váltás. ; Changing font */
function changeSize() { document.getElementById("editor").style.fontSize = document.getElementById("highlight").style.fontSize = document.getElementById("fontSize").value + "px"; } /* Méret váltás. ; Changing size */
function toggleBold() { const style = document.getElementById("editor").style.fontWeight === 'bold' ? 'normal' : 'bold'; document.getElementById("editor").style.fontWeight = document.getElementById("highlight").style.fontWeight = style; } /* Félkövér váltás. ; Toggling bold */
function toggleItalic() { const style = document.getElementById("editor").style.fontStyle === 'italic' ? 'normal' : 'italic'; document.getElementById("editor").style.fontStyle = document.getElementById("highlight").style.fontStyle = style; } /* Dölt váltás. ; Toggling italic */
function toggleUnderline() { const style = document.getElementById("editor").style.textDecoration === 'underline' ? 'none' : 'underline'; document.getElementById("editor").style.textDecoration = document.getElementById("highlight").style.textDecoration = style; } /* Aláhúzás váltás. ; Toggling underline */
function toggleDark() { document.body.classList.toggle("light"); } /* Világos/sötét mód. ; Dark/light mode */
function undo() { document.execCommand('undo'); } /* Visszavonás. ; Undo action */
function redo() { document.execCommand('redo'); } /* Újra. ; Redo action */
function setZenburn(on) { if(on) document.body.classList.add("zenburn-mode"); else document.body.classList.remove("zenburn-mode"); applyHighlight(); } /* Zenburn mód. ; Zenburn mode */

function updateStyles() {
    const hex = document.getElementById("bgColor").value;
    const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
    document.getElementById("container").style.backgroundColor = `rgba(${r},${g},${b}, ${document.getElementById("opacity").value})`;
    if (!document.body.classList.contains("zenburn-mode")) document.getElementById("highlight").style.color = document.getElementById("textColor").value;
} /* Stílusok frissítése. ; Updating styles */

async function translateText() {
    const dir = document.getElementById("transDir").value.split('|');
    const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${dir[0]}&tl=${dir[1]}&dt=t&q=${encodeURIComponent(document.getElementById("editor").value)}`);
    const data = await res.json();
    let t = ""; data[0].forEach(i => { if(i[0]) t += i[0]; });
    document.getElementById("editor").value = t; handleInput();
} /* Fordítás funkció. ; Translation function */

function speakText(){ window.speechSynthesis.cancel(); const m=new SpeechSynthesisUtterance(document.getElementById("editor").value); m.lang='hu-HU'; window.speechSynthesis.speak(m); } /* Felolvasás. ; Speech synthesis */
function stopSpeak(){ window.speechSynthesis.cancel(); } /* Megállítás. ; Stopping speech */

async function importFiles() {
    const input = document.createElement('input'); input.type = 'file'; input.multiple = true;
    input.onchange = async e => {
        const files = Array.from(e.target.files);
        for (const file of files) {
            if (file.name.endsWith('.zip')) {
                const zip = await JSZip.loadAsync(file);
                for (const path in zip.files) { if (!zip.files[path].dir) { notes[path.split('/').pop()] = await zip.files[path].async("string"); } }
            } else { notes[file.name] = await file.text(); }
            current = file.name;
        }
        saveData(); refresh(); alert("Import kész!");
    };
    input.click();
} /* Importálás funkció. ; Import function */

function saveIni() { const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([document.getElementById("editor").value])); a.download = current+".ini"; a.click(); } /* INI mentés. ; Save as INI */
function downloadTxt() { const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([document.getElementById("editor").value])); a.download = current + ".txt"; a.click(); } /* TXT mentés. ; Save as TXT */
function downloadPDF() { const doc = new jspdf.jsPDF(); doc.text(document.getElementById("editor").value, 10, 10); doc.save(current + ".pdf"); } /* PDF mentés. ; Save as PDF */

function downloadAllZip() {
    const customName = prompt("Add meg a mentés nevét (opcionális):", ""); 
    const date = new Date().toISOString().slice(0, 10); 
    const zip = new JSZip(); 
    Object.keys(notes).forEach(n => zip.file(n + ".txt", notes[n]));
    
    zip.generateAsync({type: "blob"}).then(c => { 
        const a = document.createElement("a"); 
        const fileName = `ULTRA-NOTE-TXT-Mentések_${customName ? customName + '_' : ''}${date}.zip`; 
        a.href = URL.createObjectURL(c); 
        a.download = fileName; 
        a.click(); 
    });
} /* ZIP mentés. ; Save as ZIP */

function exportJSON(){ const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([JSON.stringify(notes, null, 2)])); a.download = "mentes.json"; a.click(); } /* JSON export. ; Export to JSON */
function searchText(){
    let q=document.getElementById("search").value.toLowerCase(); if(!q) return;
    let pos=document.getElementById("editor").value.toLowerCase().indexOf(q);
    if(pos!==-1){document.getElementById("editor").focus(); document.getElementById("editor").setSelectionRange(pos,pos+q.length);}
} /* Keresés a szövegben. ; Text search */

const fDrop = document.getElementById('fontFamily');
rawFonts.forEach((f, i) => { 
    let o = document.createElement('option'); 
    o.value = f; 
    o.textContent = (i + 1) + ". " + f; 
    o.style.color = fontColors[i % fontColors.length]; 
    o.style.fontFamily = f; 
    fDrop.appendChild(o); 
}); /* Betűtípusok betöltése. ; Loading font list */
fDrop.value = "Arial"; 

updateStyles(); /* Alapstílus frissítés. ; Initial style update */
changeFont(); /* Alap betűtípus. ; Initial font */
</script>
</body>
</html>
