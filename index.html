<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Végtelen Jegyzet PRO - STABLE V.01</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Abel&family=Abril+Fatface&family=Acme&family=Alegreya&family=Alex+Brush&family=Alfa+Slab+One&family=Alice&family=Alumni+Sans+Inline+One&family=Amatic+SC&family=Amita&family=Antic+Didone&family=Anton&family=Architects+Daughter&family=Archivo+Black&family=Are+You+Serious&family=Arima+Madurai&family=Arvo&family=Asap&family=Asset&family=Atomic+Age&family=Audiowide&family=Bangers&family=Barlow+Condensed&family=Bebas+Neue&family=Berkshire+Swash&family=Bevan&family=Bigelow+Rules&family=Black+Ops+One&family=Bonbon&family=Boogaloo&family=Bowlby+One+SC&family=Bungee+Shade&family=Butcherman&family=Cabin+Sketch&family=Caesar+Dressing&family=Carter+One&family=Caveat&family=Cinzel+Decorative&family=Codystar&family=Comfortaa&family=Coming+Soon&family=Concert+One&family=Cookie&family=Courgette&family=Creepster&family=Dancing+Script&family=Diplomata+SC&family=Domine&family=Eater&family=EB+Garamond&family=Emblema+One&family=Ewert&family=Fascinate+Inline&family=Faster+One&family=Finger+Paint&family=Flavors&family=Fontdiner+Swanky&family=Fredericka+the+Great&family=Frijole&family=Fugaz+One&family=Glass+Antiqua&family=Gloria+Hallelujah&family=Gochi+Hand&family=Great+Vibes&family=Grenze+Gotisch&family=Griffy&family=Handlee&family=Henny+Penny&family=Iceberg&family=Indie+Flower&family=Irish+Grover&family=Italianno&family=Jolly+Lodger&family=Kaushan+Script&family=Kelly+Slab&family=Kranky&family=Kumar+One&family=Lobster&family=Londrina+Shadow&family=Luckiest+Guy&family=Macondo&family=MedievalSharp&family=Megrim&family=Metal+Mania&family=Modak&family=Monoton&family=Mountains+of+Christmas&family=Mystery+Quest&family=Nabla&family=Nosifer&family=Nothing+You+Could+Do&family=Orbitron&family=Pacifico&family=Parisienne&family=Permanent+Marker&family=Pinyon+Script&family=Playfair+Display&family=Press+Start+2P&family=Righteous&family=Rubik+Glitch&family=Sacramento&family=Satisfy&family=Shadows+Into+Light&family=Silkscreen&family=Special+Elite&family=Syncopate&family=Ultra&family=UnifrakturMaguntia&family=VT323&family=Wallpoet&family=Zeyada&family=Montserrat&family=Nunito&family=Oswald&family=Spectral&family=Varela+Round&family=Roboto+Serif&family=Roboto+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0c0c;--panel:#141414;--text:#ddd;--border:#333;--accent:#00ff00;--val-color:#00ffff;} /* Alapértelmezett színek. */
.light{--bg:#f0f0f0;--panel:#e0e0e0;--text:#111;--border:#ccc;--accent:#008800;--val-color:#0000ff;} /* Világos mód. */
body { margin: 0; font-family: Arial, sans-serif; background-color: var(--bg); color: var(--text); overflow: hidden; } /* Alapstílus. */
#neon-id { color: #00ff00; text-shadow: 0 0 5px #00ff00, 0 0 10px #00ff00; font-weight: bold; font-family: 'Orbitron', sans-serif; padding: 0 15px; font-size: 14px; } /* Neon azonosító. */
.color-green { color: #55ff55 !important; } /* Zöld gomb. */
.color-cyan { color: #55ffff !important; } /* Cián gomb. */
.color-red { color: #ff5555 !important; } /* Piros gomb. */
.zenburn-mode .token-section { color: #8cd0d3 !important; font-weight: bold; } /* Zenburn szekció. */
.zenburn-mode .token-key { color: #f0ef9d !important; } /* Zenburn kulcs. */
.zenburn-mode .token-comment { color: #7f9f7f !important; font-style: italic; } /* Zenburn komment. */
.danger-reset { color: #ff0000 !important; border: 2px solid #ff0000 !important; font-weight: bold !important; } /* Reset gomb. */
.success-import { color: #00ff00 !important; border: 2px solid #00ff00 !important; font-weight: bold !important; } /* Import gomb. */
#topbar{display:flex;flex-wrap:wrap;gap:5px;padding:10px;background:var(--panel);border-bottom:1px solid var(--border);align-items:center;} /* Felső sáv. */
button,select,input{background:#000;color:var(--text);border:1px solid var(--border);padding:8px 12px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:14px;display:inline-flex;align-items:center;gap:6px;} /* Interaktív elemek. */
#notes { font-weight: bold; width: 220px; color: #00ff00; } /* Jegyzetválasztó. */
#container { position: relative; width: 100vw; height: calc(100vh - 160px); background: rgba(0,0,0,0.8); overflow: hidden; } /* Konténer. */
#editor, #highlight { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 20px; box-sizing: border-box; border: none; outline: none; line-height: 1.5; font-size: 25px; white-space: pre-wrap; word-wrap: break-word; margin: 0; overflow-y: auto; font-family: Arial, sans-serif; } /* Szövegrétegek. */
#editor { background: transparent; color: transparent; caret-color: white; z-index: 2; resize: none; -webkit-text-fill-color: transparent; } /* Szerkesztő felület. */
#highlight { z-index: 1; pointer-events: none; color: inherit; } /* Megjelenítő felület. */
#stats{position:fixed;bottom:10px;right:20px;font-family:'VT323';font-size:18px;color:var(--accent);pointer-events:none;} /* Statisztika sáv. */
.group{display:flex;align-items:center;gap:6px;border-right:1px solid var(--border);padding-right:8px;margin-right:4px;} /* Csoportosítás. */
</style>
</head>
<body class="zenburn-mode">

<div id="topbar">
    <div id="neon-id">ULTRA-NOTE-TXT-Save_STABLE_V.01</div> <div class="group">
        <select id="notes" onchange="switchNote()"></select> <button onclick="newNote()">+ Új</button> </div>

    <div class="group">
        <select id="fontFamily" onchange="changeFont()"></select> <input type="number" id="fontSize" value="25" min="8" max="150" style="width:60px" oninput="changeSize()"> <button onclick="toggleBold()" class="color-green"><b>B</b></button> <button onclick="toggleItalic()" class="color-cyan"><i>/</i></button> <button onclick="toggleUnderline()" class="color-red"><u>U</u></button> </div>

    <div class="group">
        <input type="color" id="textColor" value="#eeeeee" oninput="updateStyles()"> <input type="color" id="bgColor" value="#000000" oninput="updateStyles()"> <input type="range" id="opacity" min="0" max="1" step="0.1" value="0.7" style="width:100px" oninput="updateStyles()"> <button onclick="speakText()">🔊</button> <button onclick="stopSpeak()" style="background:#800000; color:white">■</button> <button onclick="setZenburn(true)">🎨 Z</button> <button onclick="setZenburn(false)">⚪ N</button> </div>

    <div class="group">
        <select id="transDir">
            <option value="hu|en">Magyar ➡ Angol</option>
            <option value="en|hu">Angol ➡ Magyar</option>
        </select> <button onclick="translateText()" class="color-green">🌐 Fordítás</button> </div>

    <div class="group">
        <button onclick="exportJSON()">✉️ Küldés</button> <button onclick="toggleDark()">🌗 Mód</button> <button onclick="undo()">⬅️ Vissza</button> <button onclick="redo()">➡️ Előre</button> </div>

    <div class="group">
        <button onclick="importFiles()" class="success-import">📁 Import</button> <button onclick="saveIni()" style="color:#ffcc00">📜 INI</button> <button onclick="downloadPDF()" style="color:#ff5555">📄 PDF</button> <button onclick="downloadTxt()" style="color:#ff55ff">⬇️ TXT</button> <button onclick="downloadAllZip()" style="color:#55ff55">📦 ZIP</button> </div>

    <div class="group">
        <button onclick="deleteCurrent()" class="color-red">🗑️ Töröl</button> <button onclick="resetApp()" class="danger-reset">⚠️ RESET</button> </div>

    <input id="search" placeholder="Keresés..." oninput="searchText()"> </div>

<div id="container">
    <div id="highlight"></div> <textarea id="editor" spellcheck="false" oninput="handleInput()" onpaste="handlePaste()" onscroll="syncScroll()" placeholder="Írj ide..."></textarea> </div>
<div id="stats">Szavak: <span id="wCount">0</span> | Karakterek: <span id="cCount">0</span></div> <script>
const rawFonts = ["Abel","Abril Fatface","Acme","Alegreya","Alex Brush","Alfa Slab One","Alice","Alumni Sans Inline One","Amatic SC","Amita","Antic Didone","Anton","Architects Daughter","Archivo Black","Are You Serious","Arial","Arima Madurai","Arvo","Asap","Asset","Atomic Age","Audiowide","Bangers","Barlow Condensed","Bebas Neue","Berkshire Swash","Bevan","Bigelow Rules","Black Ops One","Bonbon","Boogaloo","Bowlby One SC","Bungee Shade","Butcherman","Cabin Sketch","Caesar Dressing","Carter One","Caveat","Cinzel Decorative","Codystar","Comfortaa","Coming Soon","Concert One","Cookie","Courgette","Creepster","Dancing Script","Diplomata SC","Domine","Eater","EB Garamond","Emblema One","Ewert","Fascinate Inline","Faster One","Finger Paint","Flavors","Fontdiner Swanky","Fredericka the Great","Frijole","Fugaz One","Glass Antiqua","Gloria Hallelujah","Gochi Hand","Great Vibes","Grenze Gotisch","Griffy","Handlee","Henny Penny","Iceberg","Indie Flower","Irish Grover","Italianno","Jolly Lodger","Kaushan Script","Kelly Slab","Kranky","Kumar One","Lobster","Londrina Shadow","Luckiest Guy","Macondo","MedievalSharp","Megrim","Metal Mania","Modak","Monoton","Mountains of Christmas","Mystery Quest","Nabla","Nosifer","Nothing You Could Do","Orbitron","Pacifico","Parisienne","Permanent Marker","Pinyon Script","Playfair Display","Press Start 2P","Righteous","Rubik Glitch","Sacramento","Satisfy","Shadows Into Light","Silkscreen","Special Elite","Syncopate","Ultra","UnifrakturMaguntia","VT323","Wallpoet","Zeyada","Montserrat","Nunito","Oswald","Spectral","Varela Round","Roboto Serif","Roboto Mono"]; /* 119 betűtípus. */
const fontColors = ["#ff5555", "#55ff55", "#5555ff", "#ffff55", "#ff55ff", "#55ffff", "#ffaa00", "#ff00aa", "#aa00ff", "#00ffaa"]; /* Színek. */

let db; /* DB. */
let notes = {}; /* Jegyzetek. */
let current = ""; /* Aktuális. */

const request = indexedDB.open("NotesUltraDB", 1); /* DB nyitás. */
request.onupgradeneeded = e => { db = e.target.result; db.createObjectStore("notes"); };
request.onsuccess = e => { db = e.target.result; loadFromDB(); };

function loadFromDB() {
    const transaction = db.transaction(["notes"], "readonly");
    const store = transaction.objectStore("notes");
    const req = store.get("all_notes");
    req.onsuccess = () => {
        notes = req.result || {"Üdvözlő!!!": "Készen állunk! ; Ready to go"};
        current = Object.keys(notes)[0];
        refresh();
    };
}

function saveData() { if (!db) return; const transaction = db.transaction(["notes"], "readwrite"); transaction.objectStore("notes").put(notes, "all_notes"); }

function handleInput() { notes[current] = document.getElementById("editor").value; applyHighlight(); updateStats(); saveData(); }
function handlePaste() { setTimeout(handleInput, 0); }

function refresh() {
    const select = document.getElementById("notes");
    select.innerHTML = "";
    Object.keys(notes).forEach((n, i) => {
        let o = document.createElement("option"); o.value = n; o.textContent = n;
        o.style.color = fontColors[i % fontColors.length]; /* Színes nevek. */
        select.appendChild(o);
    });
    select.value = current;
    document.getElementById("editor").value = notes[current] || "";
    applyHighlight();
    updateStats();
}

function switchNote() { current = document.getElementById("notes").value; refresh(); }
function newNote() { let n = prompt("Név:"); if (n) { notes[n] = ""; current = n; refresh(); saveData(); } }

function deleteCurrent() { if (confirm("Törlöd ezt a jegyzetet?")) { delete notes[current]; current = Object.keys(notes)[0] || "Üdvözlő!!!"; if(!notes[current]) notes["Üdvözlő!!!"] = ""; refresh(); saveData(); } }

function resetApp() { if (confirm("MINDEN törlődik! Biztos?")) { const t = db.transaction(["notes"], "readwrite"); t.objectStore("notes").clear(); location.reload(); } }

function applyHighlight() {
    const editor = document.getElementById("editor");
    const highlight = document.getElementById("highlight");
    let html = editor.value.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    if (document.body.classList.contains("zenburn-mode")) {
        html = html.replace(/(\[.*?\])/g, '<span class="token-section">$1</span>')
                   .replace(/^([\w\s]+=)/gm, '<span class="token-key">$1</span>')
                   .replace(/(;.*$)/gm, '<span class="token-comment">$1</span>');
    }
    highlight.innerHTML = html + (editor.value.endsWith('\n') ? ' ' : '');
}

function syncScroll() { document.getElementById("highlight").scrollTop = document.getElementById("editor").scrollTop; }
function updateStats() { 
    const val = document.getElementById("editor").value;
    document.getElementById("wCount").innerText = val.trim() ? val.trim().split(/\s+/).length : 0; 
    document.getElementById("cCount").innerText = val.length; 
}

function changeFont() { document.getElementById("editor").style.fontFamily = document.getElementById("highlight").style.fontFamily = document.getElementById("fontFamily").value; }
function changeSize() { document.getElementById("editor").style.fontSize = document.getElementById("highlight").style.fontSize = document.getElementById("fontSize").value + "px"; }
function toggleBold() { document.getElementById("editor").style.fontWeight = (document.getElementById("editor").style.fontWeight === 'bold' ? 'normal' : 'bold'); applyHighlight(); }
function toggleItalic() { document.getElementById("editor").style.fontStyle = (document.getElementById("editor").style.fontStyle === 'italic' ? 'normal' : 'italic'); applyHighlight(); }
function toggleUnderline() { document.getElementById("editor").style.textDecoration = (document.getElementById("editor").style.textDecoration === 'underline' ? 'none' : 'underline'); applyHighlight(); }
function toggleDark() { document.body.classList.toggle("light"); }
function undo() { document.execCommand('undo'); }
function redo() { document.execCommand('redo'); }
function setZenburn(on) { if(on) document.body.classList.add("zenburn-mode"); else document.body.classList.remove("zenburn-mode"); applyHighlight(); }

function updateStyles() {
    const hex = document.getElementById("bgColor").value;
    const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
    document.getElementById("container").style.backgroundColor = `rgba(${r},${g},${b}, ${document.getElementById("opacity").value})`;
    if (!document.body.classList.contains("zenburn-mode")) document.getElementById("highlight").style.color = document.getElementById("textColor").value;
}

async function translateText() {
    const dir = document.getElementById("transDir").value.split('|');
    const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${dir[0]}&tl=${dir[1]}&dt=t&q=${encodeURIComponent(document.getElementById("editor").value)}`);
    const data = await res.json();
    let t = ""; data[0].forEach(i => { if(i[0]) t += i[0]; });
    document.getElementById("editor").value = t; handleInput();
}

function speakText(){ window.speechSynthesis.cancel(); const m=new SpeechSynthesisUtterance(document.getElementById("editor").value); m.lang='hu-HU'; window.speechSynthesis.speak(m); }
function stopSpeak(){ window.speechSynthesis.cancel(); }

async function importFiles() {
    const input = document.createElement('input'); input.type = 'file'; input.multiple = true;
    input.onchange = async e => {
        const files = Array.from(e.target.files);
        for (const file of files) {
            if (file.name.endsWith('.zip')) {
                const zip = await JSZip.loadAsync(file);
                for (const path in zip.files) { if (!zip.files[path].dir) { notes[path.split('/').pop()] = await zip.files[path].async("string"); } }
            } else { notes[file.name] = await file.text(); }
            current = file.name;
        }
        saveData(); refresh(); alert("Import kész!");
    };
    input.click();
}

function saveIni() { const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([document.getElementById("editor").value])); a.download = current+".ini"; a.click(); }
function downloadTxt() { const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([document.getElementById("editor").value])); a.download = current + ".txt"; a.click(); }
function downloadPDF() { const doc = new jspdf.jsPDF(); doc.text(document.getElementById("editor").value, 10, 10); doc.save(current + ".pdf"); }

function downloadAllZip() {
    const customName = prompt("Add meg a mentés nevét (opcionális):", ""); /* Felugró ablak a névhez. */
    const date = new Date().toISOString().slice(0, 10); /* Aktuális dátum ISO formátumban. */
    const zip = new JSZip(); 
    Object.keys(notes).forEach(n => zip.file(n + ".txt", notes[n]));
    
    zip.generateAsync({type: "blob"}).then(c => { 
        const a = document.createElement("a"); 
        const fileName = `ULTRA-NOTE-TXT-Mentések_${customName ? customName + '_' : ''}${date}.zip`; /* Új névstruktúra. */
        a.href = URL.createObjectURL(c); 
        a.download = fileName; 
        a.click(); 
    });
}

function exportJSON(){ const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([JSON.stringify(notes, null, 2)])); a.download = "mentes.json"; a.click(); }
function searchText(){
    let q=document.getElementById("search").value.toLowerCase(); if(!q) return;
    let pos=document.getElementById("editor").value.toLowerCase().indexOf(q);
    if(pos!==-1){document.getElementById("editor").focus(); document.getElementById("editor").setSelectionRange(pos,pos+q.length);}
}

const fDrop = document.getElementById('fontFamily');
rawFonts.forEach((f, i) => { 
    let o = document.createElement('option'); 
    o.value = f; 
    o.textContent = (i + 1) + ". " + f; /* Sorszámozott lista. */
    o.style.color = fontColors[i % fontColors.length]; /* Színes nevek. */
    o.style.fontFamily = f; 
    fDrop.appendChild(o); 
});
fDrop.value = "Arial"; /* Alapértelmezett betűtípus. */

updateStyles();
changeFont();
</script>
</body>
</html>
