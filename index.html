<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Végtelen Jegyzet PRO - Fordítóval</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Monoton&family=Pinyon+Script&family=Nabla&family=Bungee+Shade&family=Ewert&family=Vast+Shadow&family=Creepster&family=Lobster&family=Righteous&family=Faster+One&family=Special+Elite&family=Orbitron&family=Pacifico&family=Press+Start+2P&family=Permanent+Marker&family=Sacramento&family=Silkscreen&family=Codystar&family=Megrim&family=Fredericka+the+Great&family=UnifrakturMaguntia&family=Wallpoet&family=Syncopate&family=Fascinate+Inline&family=Nosifer&family=Rubik+Glitch&family=Bangers&family=Alumni+Sans+Inline+One&family=Iceberg&family=Glass+Antiqua&family=Kranky&family=Great+Vibes&family=Bruno+Ace+SC&family=VT323&family=Montserrat&family=Nunito&family=Oswald&family=Playfair+Display&family=Spectral&family=Ultra&family=Varela+Round&family=Alegreya&family=Roboto+Serif&family=Roboto+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0e0e;--panel:#1a1a1a;--text:#eee;--border:#444;--accent:#00ff00;}
.light{--bg:#f5f5f5;--panel:#e0e0e0;--text:#222;--border:#bbb;--accent:#008800;}
body{margin:0;background:var(--bg);color:var(--text);font-family:Arial, sans-serif;overflow:hidden;}
#topbar{display:flex;flex-wrap:wrap;gap:6px;padding:10px;background:var(--panel);border-bottom:2px solid var(--border);align-items:center;}
button,select,input{background:#000;color:var(--text);border:1px solid var(--border);padding:6px 10px;border-radius:4px;cursor:pointer;font-family:inherit;}
button:hover{background:#333;}
textarea{width:100vw;height:calc(100vh - 140px);background:rgba(0,0,0,0.7);color:inherit;border:none;padding:20px;box-sizing:border-box;resize:none;line-height:1.6;font-size:25px;outline:none;}
#stats{position:fixed;bottom:10px;right:20px;font-family:'VT323';font-size:20px;color:var(--accent);pointer-events:none;z-index:10;}
#pdf-helper{position:absolute;left:-9999px;width:800px;padding:40px;white-space:pre-wrap;}
.group{display:flex;align-items:center;gap:4px;border-right:1px solid var(--border);padding-right:8px;margin-right:4px;}
</style>
</head>
<body>

<div id="topbar">
<div class="group">
    <select id="notes" onchange="switchNote()"></select>
    <button onclick="newNote()">+ Új</button>
</div>

<div class="group">
<select id="fontFamily" onchange="changeFont()">
    <option value="Arial" style="color:#ffffff;">1. Arial (Alap)</option>
    <option value="Montserrat" style="color:#00ffcc;font-family:'Montserrat';">2. Montserrat</option>
    <option value="Nunito" style="color:#ffccff;font-family:'Nunito';">3. Nunito</option>
    <option value="Oswald" style="color:#ff6600;font-family:'Oswald';">4. Oswald</option>
    <option value="Playfair Display" style="color:#ffff99;font-family:'Playfair Display';">5. Playfair</option>
    <option value="Spectral" style="color:#99ff99;font-family:'Spectral';">6. Spectral</option>
    <option value="Ultra" style="color:#ff3333;font-family:'Ultra';">7. Ultra</option>
    <option value="Varela Round" style="color:#66ccff;font-family:'Varela Round';">8. Varela</option>
    <option value="Roboto Mono" style="color:#00ff00;font-family:'Roboto Mono';">9. Mono</option>
    <option value="Orbitron" style="color:#00f6ff;font-family:'Orbitron';">10. Sci-Fi</option>
    <option value="Special Elite" style="color:#ffd700;font-family:'Special Elite';">11. Gépelt</option>
    <option value="VT323" style="color:#00ff00;font-family:'VT323';">12. Terminál</option>
    <option value="Press Start 2P" style="color:#ffff00;font-family:'Press Start 2P';">13. 8-Bit</option>
    <option value="Monoton" style="color:#ff00ff;font-family:'Monoton';">14. Neon</option>
    <option value="Pinyon Script" style="color:#00ff99;font-family:'Pinyon Script';">15. Kézírás</option>
    <option value="Creepster" style="color:#ff0000;font-family:'Creepster';">16. Horror</option>
    <option value="Nabla" style="color:#ff6600;font-family:'Nabla';">17. 3D Nabla</option>
    <option value="Lobster" style="color:#00f6ff;font-family:'Lobster';">18. Lobster</option>
    <option value="Bungee Shade" style="color:#ff33ff;font-family:'Bungee Shade';">19. Bungee</option>
    <option value="Permanent Marker" style="color:#ff6600;font-family:'Permanent Marker';">20. Filctoll</option>
    <option value="Silkscreen" style="color:#33ff33;font-family:'Silkscreen';">21. Pixel</option>
    <option value="UnifrakturMaguntia" style="color:#7a001f;font-family:'UnifrakturMaguntia';">22. Gótikus</option>
    <option value="Wallpoet" style="color:#0080ff;font-family:'Wallpoet';">23. Graffiti</option>
    <option value="Nosifer" style="color:#ff0000;font-family:'Nosifer';">24. Vérző</option>
    <option value="Rubik Glitch" style="color:#ffff00;font-family:'Rubik Glitch';">25. Glitch</option>
    <option value="Bangers" style="color:#ff00ff;font-family:'Bangers';">26. Képregény</option>
    <option value="Iceberg" style="color:#aaddff;font-family:'Iceberg';">27. Jéghegy</option>
    <option value="Great Vibes" style="color:#ff99cc;font-family:'Great Vibes';">28. Elegáns</option>
    <option value="Pacifico" style="color:#4db8ff;font-family:'Pacifico';">29. Pacifico</option>
    <option value="Sacramento" style="color:#ff80bf;font-family:'Sacramento';">30. Sacramento</option>
    <option value="Codystar" style="color:#ffffff;font-family:'Codystar';">31. Csillogó</option>
    <option value="Megrim" style="color:#00ff99;font-family:'Megrim';">32. Megrim</option>
    <option value="Syncopate" style="color:#ccccff;font-family:'Syncopate';">33. Syncopate</option>
    <option value="Kranky" style="color:#ffcc66;font-family:'Kranky';">34. Kranky</option>
    <option value="Ewert" style="color:#ff5050;font-family:'Ewert';">35. Ewert</option>
</select>
<input type="number" id="fontSize" value="25" min="8" max="100" style="width:50px" oninput="changeSize()">
<button id="btnBold" onclick="toggleBold()"><b>B</b></button>
<button id="btnItalic" onclick="toggleItalic()"><i>I</i></button>
</div>

<div class="group">
    <input type="color" id="textColor" value="#eeeeee" oninput="updateStyles()">
    <input type="color" id="bgColor" value="#000000" oninput="updateStyles()">
    <input type="range" id="opacity" min="0" max="1" step="0.1" value="0.7" style="width:50px" oninput="updateStyles()">
</div>

<div class="group">
    <select id="transDir">
        <option value="hu|en">Magyar ➡ Angol</option>
        <option value="en|hu">Angol ➡ Magyar</option>
    </select>
    <button onclick="translateText()">🌐 Fordítás</button>
</div>

<div class="group">
    <button onclick="speakText()">🔊 Hallgat</button>
    <button onclick="stopSpeak()" style="color:#ff4444;">⏹ Stop</button>
    <button onclick="emailNote()">📧 Küldés</button>
    <button onclick="toggleDark()">🌓 Mód</button>
</div>

<div class="group">
    <button onclick="undo()">⬅ Vissza</button>
    <button onclick="redo()">➡️ Előre</button>
</div>

<button onclick="downloadPDF()">📄 PDF</button>
<button onclick="downloadTxt()">⬇ TXT</button>
<button onclick="importTxt()">📂 Import</button>
<input type="file" id="fileInput" accept=".txt,.zip" style="display:none">
<button onclick="deleteCurrent()">🗑 Töröl</button>
<button onclick="deleteAll()">⚠️ Reset</button>
<button onclick="downloadAllZip()">📦 ZIP</button>
<input id="search" placeholder="Keresés..." style="width:100px" oninput="searchText()">
</div>

<textarea id="editor" placeholder="Írj ide..."></textarea>
<div id="stats">Szavak: 0 | Karakterek: 0</div>
<div id="pdf-helper"></div>

<script>
let notes=JSON.parse(localStorage.getItem("MY_NOTES"))||{"Üdvözlő":"Most már tudsz fordítani is a magyar és angol nyelv között!"};
let current=Object.keys(notes)[0];
const editor=document.getElementById("editor");
const select=document.getElementById("notes");
const stats=document.getElementById("stats");
const fileInput=document.getElementById("fileInput");

function updateStats(){
    const text = editor.value.trim();
    const words = text ? text.split(/\s+/).length : 0;
    stats.innerText = `Szavak: ${words} | Karakterek: ${editor.value.length}`;
}

function updateStyles(){
    editor.style.color = document.getElementById("textColor").value;
    const hex = document.getElementById("bgColor").value;
    const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
    editor.style.backgroundColor = `rgba(${r},${g},${b}, ${document.getElementById("opacity").value})`;
}

function refresh(){
    select.innerHTML="";
    for(let n in notes){
        let o=document.createElement("option"); o.value=n; o.textContent=n; select.appendChild(o);
    }
    select.value=current; editor.value=notes[current]; updateStats();
}

function switchNote(){ current=select.value; editor.value=notes[current]; updateStats(); }

editor.addEventListener("input",()=>{ 
    notes[current]=editor.value; 
    updateStats(); 
    localStorage.setItem("MY_NOTES",JSON.stringify(notes)); 
});

function newNote(){let n=prompt("Jegyzet neve:"); if(!n)return; notes[n]=""; current=n; refresh();}
function deleteCurrent(){if(confirm("Törlöd ezt a jegyzetet?")){delete notes[current]; current=Object.keys(notes)[0]||"Jegyzet_1"; if(!notes[current]) notes[current]=""; refresh(); localStorage.setItem("MY_NOTES",JSON.stringify(notes));}}
function deleteAll(){if(confirm("FIGYELEM: Minden jegyzet törlődik! Biztosan akarod?")){localStorage.clear(); location.reload();}}

function changeFont(){editor.style.fontFamily=document.getElementById("fontFamily").value;}
function changeSize(){editor.style.fontSize=document.getElementById("fontSize").value+"px";}
function toggleBold(){editor.style.fontWeight = editor.style.fontWeight==='bold'?'normal':'bold';}
function toggleItalic(){editor.style.fontStyle = editor.style.fontStyle==='italic'?'normal':'italic';}
function toggleDark(){document.body.classList.toggle("light");}

// Fordító Funkció
async function translateText() {
    const dir = document.getElementById("transDir").value.split('|');
    const start = editor.selectionStart;
    const end = editor.selectionEnd;
    const sourceText = (start !== end) ? editor.value.substring(start, end) : editor.value;

    if (!sourceText.trim()) return;

    try {
        const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${dir[0]}&tl=${dir[1]}&dt=t&q=${encodeURIComponent(sourceText)}`);
        const data = await res.json();
        let translated = "";
        data[0].forEach(item => { if(item[0]) translated += item[0]; });

        if (start !== end) {
            editor.setRangeText(translated, start, end, 'select');
        } else {
            editor.value = translated;
        }
        notes[current] = editor.value;
        localStorage.setItem("MY_NOTES", JSON.stringify(notes));
    } catch (e) {
        alert("Hiba történt a fordítás közben.");
    }
}

function speakText(){window.speechSynthesis.cancel(); const m=new SpeechSynthesisUtterance(editor.value); m.lang='hu-HU'; window.speechSynthesis.speak(m);}
function stopSpeak(){window.speechSynthesis.cancel();}
function emailNote(){window.location.href=`mailto:?subject=${current}&body=${encodeURIComponent(editor.value)}`;}

function importTxt(){
    fileInput.click();
    fileInput.onchange=()=>{
        const f=fileInput.files[0];
        if(!f) return;
        const r=new FileReader();
        if(f.name.toLowerCase().endsWith('.zip')){
            r.onload = e => {
                JSZip.loadAsync(e.target.result).then(zip => {
                    zip.forEach((path, file) => {
                        if(!file.dir && path.endsWith('.txt')){
                            file.async("string").then(content => {
                                let n = path.replace(".txt","");
                                notes[n] = content; current = n; refresh();
                                localStorage.setItem("MY_NOTES",JSON.stringify(notes));
                            });
                        }
                    });
                });
            };
            r.readAsArrayBuffer(f);
        } else {
            r.onload=e=>{
                let n = f.name.replace(".txt","");
                notes[n]=e.target.result; current=n; refresh();
                localStorage.setItem("MY_NOTES",JSON.stringify(notes));
            };
            r.readAsText(f, "UTF-8");
        }
    };
}

function downloadTxt(){const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([editor.value],{type:"text/plain"})); a.download=current+".txt"; a.click();}
function downloadAllZip(){const zip=new JSZip(); for(let n in notes){zip.file(n+".txt",notes[n]);} zip.generateAsync({type:"blob"}).then(c=>{const a=document.createElement("a"); a.href=URL.createObjectURL(c); a.download="Osszes_Jegyzet.zip"; a.click();});}

function downloadPDF(){
    const h=document.getElementById("pdf-helper");
    h.style.fontFamily=editor.style.fontFamily; h.style.fontSize=editor.style.fontSize;
    h.style.color=editor.style.color; h.style.fontWeight=editor.style.fontWeight; h.style.fontStyle=editor.style.fontStyle;
    h.innerText=editor.value;
    html2canvas(h).then(c=>{
        const pdf=new jspdf.jsPDF();
        pdf.addImage(c.toDataURL("image/png"),'PNG',0,0,210,(c.height*210)/c.width);
        pdf.save(current+".pdf");
    });
}

function undo(){ document.execCommand('undo'); }
function redo(){ document.execCommand('redo'); }
function searchText(){
    let q=document.getElementById("search").value.toLowerCase();
    let pos=editor.value.toLowerCase().indexOf(q);
    if(pos!==-1){editor.focus(); editor.setSelectionRange(pos,pos+q.length);}
}

refresh(); updateStyles();
editor.style.fontFamily="Arial"; editor.style.fontSize="25px";
</script>
</body>
</html>
